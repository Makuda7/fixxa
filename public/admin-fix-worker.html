<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fix Worker Data - Fixxa Admin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }
    input[type="number"],
    input[type="text"],
    select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    input:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .checkbox-group input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    .checkbox-group label {
      margin: 0;
      cursor: pointer;
      font-weight: normal;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    button:active {
      transform: translateY(0);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 14px;
    }
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .info-box {
      background: #e7f3ff;
      border: 1px solid #b3d9ff;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #004085;
    }
    .info-box strong {
      display: block;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Fix Worker Data</h1>
    <p class="subtitle">Admin utility to correct worker verification and rating data</p>

    <div class="info-box">
      <strong>Quick Fix for Nkululeko:</strong>
      Enter Worker ID: <strong>4</strong>, check "Set is_verified to true", and click Fix Worker Data.
    </div>

    <form id="fixWorkerForm">
      <div class="form-group">
        <label for="workerId">Worker ID</label>
        <input type="number" id="workerId" placeholder="Enter worker ID" required />
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="fixIsVerified" />
        <label for="fixIsVerified">Set is_verified to true</label>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="fixRating" />
        <label for="fixRating">Fix rating (enter new rating below)</label>
      </div>

      <div class="form-group" id="ratingGroup" style="display: none;">
        <label for="ratingValue">New Rating Value</label>
        <input type="text" id="ratingValue" placeholder="e.g., 1.1" step="0.1" min="0" max="5" />
      </div>

      <button type="submit" id="submitBtn">Fix Worker Data</button>
    </form>

    <div id="message"></div>
  </div>

  <script>
    const fixRatingCheckbox = document.getElementById('fixRating');
    const ratingGroup = document.getElementById('ratingGroup');
    const form = document.getElementById('fixWorkerForm');
    const messageDiv = document.getElementById('message');

    // Show/hide rating input
    fixRatingCheckbox.addEventListener('change', () => {
      ratingGroup.style.display = fixRatingCheckbox.checked ? 'block' : 'none';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      messageDiv.innerHTML = '';

      const workerId = document.getElementById('workerId').value;
      const fixIsVerified = document.getElementById('fixIsVerified').checked;
      const fixRating = document.getElementById('fixRating').checked;
      const ratingValue = document.getElementById('ratingValue').value;

      if (!fixIsVerified && !fixRating) {
        messageDiv.innerHTML = '<div class="message error">Please select at least one fix option.</div>';
        return;
      }

      if (fixRating && !ratingValue) {
        messageDiv.innerHTML = '<div class="message error">Please enter a rating value.</div>';
        return;
      }

      const payload = {};
      if (fixIsVerified) payload.is_verified = true;
      if (fixRating) payload.rating = parseFloat(ratingValue);

      try {
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Fixing...';

        const res = await fetch(`/admin/fix-worker/${workerId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.success) {
          messageDiv.innerHTML = `<div class="message success">
            <strong>Success!</strong><br>
            ${data.message}<br>
            <small>Fixes applied: ${data.fixes.join(', ')}</small>
          </div>`;
          form.reset();
          ratingGroup.style.display = 'none';
        } else {
          messageDiv.innerHTML = `<div class="message error">
            <strong>Error:</strong> ${data.error || 'Failed to fix worker data'}
          </div>`;
        }

        submitBtn.disabled = false;
        submitBtn.textContent = 'Fix Worker Data';
      } catch (error) {
        messageDiv.innerHTML = `<div class="message error">
          <strong>Error:</strong> ${error.message}
        </div>`;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Fix Worker Data';
      }
    });
  </script>
</body>
</html>
