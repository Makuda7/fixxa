cat > public/resend-verification.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resend Verification - Fixxa</title>
<link rel="stylesheet" href="style.css">
<style>
.container { max-width: 450px; margin: 2rem auto; background: #f6f3f0; padding: 2rem; border-radius: 20px; border: 2px solid rgb(147,126,108); box-shadow: 0 4px 15px rgba(147,126,108,0.2); text-align: center; }
h2 { color: forestgreen; margin-bottom: 1.5rem; }
.input-group { margin-bottom: 1rem; text-align: left; }
label { display: block; margin-bottom: 0.3rem; color: forestgreen; font-weight: 500; }
input[type="email"] { width: 100%; padding: 10px; border: 2px solid rgb(147,126,108); border-radius: 8px; font-size: 16px; }
button { width: 100%; padding: 12px 0; margin-top: 1rem; background: forestgreen; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
button:hover { background: #228b22; }
.message { margin-bottom: 1rem; padding: 10px; border-radius: 5px; }
.success { background: rgba(40,167,69,0.1); color: #155724; border: 1px solid rgba(40,167,69,0.3); }
.error { background: rgba(220,53,69,0.1); color: #721c24; border: 1px solid rgba(220,53,69,0.3); }
</style>
</head>
<body>
<header class="header">
  <div class="logo"><a href="Index.html"><img src="images/fixxaLogp.png" alt="Fixxa Logo"></a></div>
  <nav class="nav-links">
    <a href="Index.html">Find Service</a>
    <a href="aboutus.html">About Us</a>
    <a href="login.html">Log in</a>
  </nav>
</header>

<main>
  <div class="container">
    <h2>Resend Verification Email</h2>
    <p>Enter your email address to receive a new verification link.</p>
    <div id="message"></div>
    <form id="resendForm">
      <div class="input-group">
        <label for="email">Email:</label>
        <input type="email" id="email" required>
      </div>
      <button type="submit">Send Verification Email</button>
    </form>
    <p style="margin-top: 1rem;"><a href="/login.html" style="color: forestgreen;">Back to Login</a></p>
  </div>
</main>

<script>
document.getElementById('resendForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const messageDiv = document.getElementById('message');
  
  try {
    const res = await fetch('/resend-verification', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    
    if (data.success) {
      messageDiv.innerHTML = '<div class="message success">' + data.message + '</div>';
      document.getElementById('resendForm').reset();
    } else {
      messageDiv.innerHTML = '<div class="message error">' + data.error + '</div>';
    }
  } catch (err) {
    messageDiv.innerHTML = '<div class="message error">Error sending email. Please try again.</div>';
  }
});
</script>
</body>
</html>
EOF
